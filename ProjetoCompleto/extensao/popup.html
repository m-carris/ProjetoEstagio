<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <style>
    /* Estilos da popup da extensão */
    body {
      width: 350px;
      min-height: 200px;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f5f5;
    }

    .cabecalho {
      background: #2c3e50;
      color: white;
      padding: 12px 15px;
      text-align: center;
    }

    .cabecalho h1 {
      font-size: 16px;
      margin: 0;
    }

    .lista-mensagens {
      padding: 10px;
      max-height: 380px;
      overflow-y: auto;
    }

    .mensagem {
      background: white;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      border-left: 3px solid #27ae60;
    }

    .mensagem.alta {
      border-left-color: #e74c3c;
      background: #fff5f5;
    }

    .mensagem-topo {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 5px;
    }

    .etiqueta-normal {
      color: #27ae60;
      font-weight: bold;
    }

    .etiqueta-alta {
      color: #e74c3c;
      font-weight: bold;
    }

    .data {
      color: #999;
    }

    .texto {
      font-size: 13px;
      line-height: 1.3;
    }

    .vazio {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="cabecalho">
    <h1>🔔 Notificações do Coordenador</h1>
  </div>
  <div class="lista-mensagens" id="lista-mensagens">
    <p class="vazio">A carregar...</p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
