<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      max-height: 500px;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #f5f5f5;
    }

    .cabecalho {
      background-color: #2c3e50;
      color: white;
      padding: 12px 16px;
      text-align: center;
    }

    .cabecalho h1 {
      font-size: 14px;
      margin-bottom: 2px;
    }

    .cabecalho p {
      font-size: 11px;
      opacity: 0.8;
    }

    .estado {
      padding: 8px 16px;
      font-size: 12px;
      text-align: center;
    }

    .estado.ligado { background-color: #d4edda; color: #155724; }
    .estado.desligado { background-color: #f8d7da; color: #721c24; }

    .mensagens {
      padding: 8px;
      max-height: 380px;
      overflow-y: auto;
    }

    .mensagem {
      background: white;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 6px;
      border-left: 3px solid #2ecc71;
    }

    .mensagem.alta {
      border-left-color: #e74c3c;
      background: #fff5f5;
    }

    .mensagem-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .badge {
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 10px;
      color: white;
    }

    .badge.alta { background-color: #e74c3c; }
    .badge.normal { background-color: #2ecc71; }

    .data {
      font-size: 10px;
      color: #999;
    }

    .texto {
      font-size: 13px;
      color: #333;
    }

    .vazio {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="cabecalho">
    <h1>🔔 Notificações do Coordenador</h1>
    <p>Sistema de Tráfego</p>
  </div>

  <div id="estado" class="estado ligado">✅ A monitorizar novas mensagens</div>

  <div id="mensagens" class="mensagens">
    <div class="vazio">A carregar mensagens...</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
